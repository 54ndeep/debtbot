<!-- ============================================================
  TELEGRAM FORM NOTIFIER — paste this anywhere in your HTML
  Replace YOUR_SERVER_URL with your deployed server URL
  ============================================================ -->
<script>
(function () {
  const NOTIFY_URL = "YOUR_SERVER_URL/notify"; // 👈 replace this

  document.addEventListener("submit", async function (e) {
    const form = e.target;
    if (!form || form.tagName !== "FORM") return;

    // Collect all named form fields
    const data = {};
    new FormData(form).forEach((value, key) => {
      data[key] = value;
    });

    // Fire-and-forget — won't block your form's normal behaviour
    try {
      await fetch(NOTIFY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
    } catch (err) {
      console.warn("Telegram notifier:", err.message);
    }
  });
})();
</script>
